\<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BarberFlow — Cadastro do Cliente</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="/styles/client/cadastro.css" rel="stylesheet" />
</head>
<body>
  <div class="page">

    <section class="hero">
      <div class="hero-logo">
        <div class="hero-b">B</div>
        <div class="hero-name">Barber<span class="flow">Flow</span></div>
      </div>
      <div class="hero-subtitle">Portal do Cliente</div>
      <div class="hero-ring"></div>
    </section>

    <section class="register-card">
      <h1 class="card-title">Criar conta</h1>
      <p class="card-subtitle">Cadastre-se para contratar planos, acompanhar pagamentos e agendar atendimentos.</p>

      <div id="client-feedback" class="client-feedback"></div>

      <form id="client-register-form" class="client-form">
        <div class="client-field">
          <label class="client-label">Nome completo</label>
          <input class="client-input" id="client-register-name" type="text" placeholder="Seu nome" autocomplete="name" />
        </div>

        <div class="client-field">
          <label class="client-label">WhatsApp</label>
          <input class="client-input" id="client-register-whatsapp" type="text" placeholder="(11) 99999-9999" autocomplete="tel" />
        </div>

        <div class="client-field">
          <label class="client-label">E-mail</label>
          <input class="client-input" id="client-register-email" type="email" placeholder="email@dominio.com" autocomplete="email" />
        </div>

        <div class="client-field">
          <label class="client-label">Senha</label>
          <input class="client-input" id="client-register-password" type="password" placeholder="Crie uma senha" autocomplete="new-password" />
        </div>

        <div class="client-field">
          <label class="client-label">Confirmar senha</label>
          <input class="client-input" id="client-register-password-confirm" type="password" placeholder="Repita a senha" autocomplete="new-password" />
        </div>

        <button type="submit" class="client-primary-btn">Criar conta</button>

        <div class="client-links">
          <a class="client-link-btn" href="/client/login/">Já tenho conta</a>
        </div>
      </form>
    </section>

  </div>

  <script src="/js/client/cadastro.js" type="module"></script>
</body>
</html>
