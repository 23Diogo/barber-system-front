<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BarberFlow — Área do Cliente</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'DM Sans', sans-serif;
      color: #e8f0fe;
      background:
        radial-gradient(circle at 50% 18%, rgba(255, 90, 31, 0.14), transparent 16%),
        radial-gradient(circle at 50% 18%, rgba(79, 195, 247, 0.08), transparent 28%),
        radial-gradient(circle at 0% 0%, rgba(79, 195, 247, 0.16), transparent 22%),
        radial-gradient(circle at 100% 100%, rgba(156, 111, 255, 0.18), transparent 24%),
        linear-gradient(180deg, #050816 0%, #090d1d 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(79, 195, 247, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79, 195, 247, 0.06) 1px, transparent 1px);
      background-size: 52px 52px;
      opacity: 0.24;
    }

    .page {
      min-height: 100vh;
      padding: 36px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .hero {
      text-align: center;
      margin-bottom: 28px;
    }

    .hero-logo {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .hero-b {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(58px, 10vw, 94px);
      line-height: .9;
      background: linear-gradient(180deg, #ff8a3d 0%, #ff5a1f 55%, #db3d00 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .hero-name {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(32px, 6vw, 72px);
      color: #f5f9ff;
    }

    .hero-name .flow {
      color: #4fc3f7;
    }

    .card {
      width: min(100%, 720px);
      background: rgba(7, 10, 25, 0.88);
      border: 1px solid rgba(79, 195, 247, 0.12);
      border-radius: 22px;
      padding: 26px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.34);
      backdrop-filter: blur(18px);
    }

    .title {
      margin: 0 0 10px;
      font-size: 32px;
      font-weight: 800;
      color: #fff;
    }

    .sub {
      margin: 0 0 22px;
      color: #7e8db4;
      line-height: 1.6;
    }

    .box {
      padding: 16px;
      border-radius: 16px;
      border: 1px solid rgba(79, 195, 247, 0.12);
      background: rgba(255,255,255,.03);
      margin-bottom: 16px;
    }

    .actions {
      display: grid;
      gap: 12px;
    }

    .btn {
      min-height: 50px;
      border: 0;
      border-radius: 14px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, #5dc8ff 0%, #2f8cff 55%, #1468ff 100%);
    }

    .btn-secondary {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(79, 195, 247, 0.12);
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="hero">
      <div class="hero-logo">
        <div class="hero-b">B</div>
        <div class="hero-name">Barber<span class="flow">Flow</span></div>
      </div>
    </div>

    <div class="card">
      <h1 class="title">Minha área</h1>
      <p class="sub">Você entrou com sucesso no portal do cliente.</p>

      <div id="client-home-profile" class="box">Carregando seus dados...</div>

      <div class="actions">
        <button class="btn btn-secondary" id="client-logout-btn">Sair</button>
      </div>
    </div>
  </div>

  <script src="/js/client-home.js" type="module"></script>
</body>
</html>
