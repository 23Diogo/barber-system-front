<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BarberFlow — Login do Cliente</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #050816;
      --bg-soft: #090d1d;
      --card: rgba(7, 10, 25, 0.88);
      --border: rgba(79, 195, 247, 0.12);
      --text: #e8f0fe;
      --muted: #7e8db4;
      --input-bg: rgba(8, 12, 30, 0.92);
      --input-border: rgba(79, 195, 247, 0.12);
      --blue-1: #4fc3f7;
      --blue-2: #2f8cff;
      --blue-3: #8ddcff;
      --purple: #9c6fff;
      --orange-1: #ff5a1f;
      --orange-2: #ff7a1a;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 18%, rgba(255, 90, 31, 0.14), transparent 16%),
        radial-gradient(circle at 50% 18%, rgba(79, 195, 247, 0.08), transparent 28%),
        radial-gradient(circle at 0% 0%, rgba(79, 195, 247, 0.16), transparent 22%),
        radial-gradient(circle at 100% 100%, rgba(156, 111, 255, 0.18), transparent 24%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-soft) 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(79, 195, 247, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79, 195, 247, 0.06) 1px, transparent 1px);
      background-size: 52px 52px;
      opacity: 0.24;
    }

    .page {
      min-height: 100vh;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 34px 20px 48px;
    }

    .top-mini-brand {
      width: min(100%, 1180px);
      display: flex;
      align-items: center;
      justify-content: flex-start;
      margin-bottom: 10px;
      opacity: 0.92;
    }

    .top-mini-brand .mark {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 19px;
      color: #fff;
      background: linear-gradient(135deg, var(--orange-1), var(--orange-2));
      box-shadow:
        0 0 0 1px rgba(255, 122, 26, 0.18),
        0 0 20px rgba(255, 90, 31, 0.28);
      margin-right: 12px;
    }

    .top-mini-brand .text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .top-mini-brand .title {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
    }

    .top-mini-brand .sub {
      font-size: 11px;
      color: var(--muted);
    }

    .hero {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 8px;
      margin-bottom: 28px;
      position: relative;
      z-index: 1;
    }

    .hero-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      text-align: center;
      margin-bottom: 10px;
      position: relative;
    }

    .hero-b {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(58px, 10vw, 94px);
      line-height: 0.9;
      background: linear-gradient(180deg, #ff8a3d 0%, #ff5a1f 55%, #db3d00 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow:
        0 0 18px rgba(255, 90, 31, 0.22),
        0 0 38px rgba(255, 90, 31, 0.16);
      animation: pulseB 2.2s ease-in-out infinite;
      position: relative;
      z-index: 2;
    }

    .hero-b::after {
      content: "";
      position: absolute;
      inset: 50% auto auto 50%;
      width: 110px;
      height: 110px;
      transform: translate(-50%, -50%);
      border-radius: 999px;
      background: radial-gradient(circle, rgba(255, 90, 31, 0.28), transparent 70%);
      filter: blur(14px);
      z-index: -1;
    }

    .hero-name {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(32px, 6vw, 72px);
      line-height: 1;
      letter-spacing: -0.02em;
      color: #f5f9ff;
      text-shadow: 0 0 18px rgba(255,255,255,.04);
    }

    .hero-name .flow {
      color: var(--blue-1);
      text-shadow:
        0 0 16px rgba(79, 195, 247, 0.22),
        0 0 34px rgba(79, 195, 247, 0.12);
    }

    .hero-subtitle {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
    }

    .hero-ring {
      width: min(420px, 72vw);
      height: 24px;
      margin-top: 18px;
      border-radius: 999px;
      border: 1px solid rgba(79, 195, 247, 0.28);
      background: radial-gradient(circle at center, rgba(79, 195, 247, 0.14), transparent 70%);
      box-shadow:
        0 0 18px rgba(79, 195, 247, 0.12),
        inset 0 0 20px rgba(79, 195, 247, 0.05);
    }

    .login-card {
      width: min(100%, 510px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 26px;
      box-shadow:
        0 18px 45px rgba(0, 0, 0, 0.34),
        inset 0 1px 0 rgba(255,255,255,0.02);
      backdrop-filter: blur(18px);
      position: relative;
      z-index: 1;
    }

    .login-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(79, 195, 247, 0.03), transparent 35%);
    }

    .card-title {
      margin: 0 0 6px;
      font-size: 34px;
      font-weight: 800;
      color: #fff;
    }

    .card-subtitle {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .client-feedback {
      min-height: 20px;
      margin-bottom: 12px;
      font-size: 12px;
      color: var(--muted);
    }

    .client-feedback.is-error {
      color: #ff9aa9;
    }

    .client-feedback.is-success {
      color: #00e676;
    }

    .client-form {
      display: grid;
      gap: 14px;
    }

    .client-field {
      display: grid;
      gap: 7px;
    }

    .client-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #8fa4cb;
    }

    .client-input {
      width: 100%;
      min-height: 52px;
      border-radius: 14px;
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      color: var(--text);
      padding: 0 15px;
      font: inherit;
      outline: none;
      transition: .18s ease;
    }

    .client-input::placeholder {
      color: #516384;
    }

    .client-input:focus {
      border-color: rgba(79, 195, 247, 0.42);
      box-shadow: 0 0 0 3px rgba(79, 195, 247, 0.08);
    }

    .client-primary-btn {
      min-height: 52px;
      border: 0;
      border-radius: 14px;
      font: inherit;
      font-weight: 800;
      color: #fff;
      cursor: pointer;
      background: linear-gradient(135deg, #5dc8ff 0%, #2f8cff 55%, #1468ff 100%);
      box-shadow:
        0 14px 30px rgba(47, 140, 255, 0.22),
        inset 0 1px 0 rgba(255,255,255,0.12);
      transition: transform .16s ease, box-shadow .16s ease;
    }

    .client-primary-btn:hover {
      transform: translateY(-1px);
      box-shadow:
        0 18px 32px rgba(47, 140, 255, 0.28),
        inset 0 1px 0 rgba(255,255,255,0.14);
    }

    .client-links {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 2px;
    }

    .client-link-btn {
      border: 0;
      background: transparent;
      color: var(--blue-1);
      font-weight: 700;
      cursor: pointer;
      padding: 2px 0;
      transition: opacity .16s ease;
    }

    .client-link-btn:hover {
      opacity: 0.84;
    }

    @keyframes pulseB {
      0%, 100% {
        transform: scale(1);
        filter: brightness(1);
      }
      50% {
        transform: scale(1.04);
        filter: brightness(1.12);
      }
    }

    @media (max-width: 720px) {
      .page {
        padding-top: 22px;
      }

      .top-mini-brand {
        justify-content: center;
        margin-bottom: 16px;
      }

      .card-title {
        font-size: 28px;
      }

      .login-card {
        padding: 22px 18px;
      }

      .client-links {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  

    <section class="hero">
      <div class="hero-logo">
        <div class="hero-b">B</div>
        <div class="hero-name">Barber<span class="flow">Flow</span></div>
      </div>
      <div class="hero-subtitle">Portal do Cliente</div>
      <div class="hero-ring"></div>
    </section>

    <section class="login-card">
      <h1 class="card-title">Entrar</h1>
      <p class="card-subtitle">Acesse sua conta para acompanhar seus planos, pagamentos e agendamentos.</p>

      <div id="client-feedback" class="client-feedback"></div>

      <form id="client-login-form" class="client-form">
        <div class="client-field">
          <label class="client-label">WhatsApp ou e-mail</label>
          <input class="client-input" id="client-login-identifier" type="text" placeholder="(11) 99999-9999 ou email@dominio.com" />
        </div>

        <div class="client-field">
          <label class="client-label">Senha</label>
          <input class="client-input" id="client-login-password" type="password" placeholder="Digite sua senha" />
        </div>

        <button type="submit" class="client-primary-btn">Entrar</button>

        <div class="client-links">
          <button type="button" class="client-link-btn" id="go-client-register">Criar cadastro</button>
          <button type="button" class="client-link-btn" id="go-client-forgot">Esqueci minha senha</button>
        </div>
      </form>
    </section>
  </div>

  <script src="/js/client-login.js" type="module"></script>
</body>
</html>
